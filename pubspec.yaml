name: urban_quest
description: "Chasse au trésor urbaine - marche dans ton quartier."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # --- Carte & Géolocalisation ---
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  geolocator: ^13.0.2

  # --- Overpass / Réseau ---
  dio: ^5.8.0+1
  connectivity_plus: ^6.1.4

  # --- État (Riverpod) ---
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # --- Persistance locale ---
  hive_ce: ^2.9.0
  hive_ce_flutter: ^2.2.0
  shared_preferences: ^2.5.3

  # --- Boussole ---
  sensors_plus: ^6.1.0

  # --- Podomètre ---
  pedometer: ^4.1.0
  permission_handler: ^11.4.0

  # --- Notifications ---
  flutter_local_notifications: ^18.0.1

  # --- Caméra ---
  image_picker: ^1.1.2
  path_provider: ^2.1.5

  # --- Navigation ---
  go_router: ^14.8.1

  intl: ^0.20.2

  # --- Typographie ---
  google_fonts: ^6.2.1

  # --- Utilitaires ---
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  freezed: ^3.0.0
  riverpod_generator: ^2.6.5
  hive_ce_generator: ^1.8.0
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true
